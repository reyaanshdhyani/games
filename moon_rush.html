<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Moon Rush</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=canvas.width=Math.min(window.innerWidth,480);
const H=canvas.height=Math.min(window.innerHeight,720);

// ── LEVEL SELECT ───────────────────────────────────────
let lvlPickerOpen=false, selectedStartLevel=1;
function getXY(e){
  const r=canvas.getBoundingClientRect();
  return{mx:(e.clientX-r.left)*(W/r.width), my:(e.clientY-r.top)*(H/r.height)};
}

// ── STATE ──────────────────────────────────────────────
let state='start';
let currentLevel=1;
let lives=3;
let score=0;

// ── STARS ─────────────────────────────────────────────
const STARS=Array.from({length:150},()=>({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*1.4+0.2, a:Math.random()*0.9+0.1,
  spd:Math.random()*0.6+0.1
}));

// ── MOON ──────────────────────────────────────────────
const MOON={x:W/2, y:75, r:44};

// ── ROCKET ────────────────────────────────────────────
const R={x:W/2, y:H-110, vx:0, vy:0, w:22, h:46, invincible:0, flame:[]};

// ── COLLECTIONS ───────────────────────────────────────
let asteroids=[], particles=[], flashes=[];

// ── LEVEL CONFIG ──────────────────────────────────────
function getLvlCfg(lvl){
  const t=(lvl-1)/9;
  return{
    count:  6+Math.floor(lvl*2.4),   // 8→28
    minSpd: 0.8+t*2.8,
    maxSpd: 1.8+t*4.2,
    minR:   Math.max(8,22-lvl),
    maxR:   44+lvl*4,
    homing: lvl>=5,                  // asteroids steer toward player
    splitter: lvl>=7,                // big ones split on wrap
    chaotic: lvl>=4
  };
}

// ── SPAWN ─────────────────────────────────────────────
function makeAsteroid(lvl, forceY){
  const cfg=getLvlCfg(lvl);
  const r=cfg.minR+Math.random()*(cfg.maxR-cfg.minR);
  const x=r+Math.random()*(W-r*2);
  const y=forceY!==undefined?forceY:MOON.y+MOON.r+r+Math.random()*(H-MOON.y-MOON.r-180-r*2);
  const spd=cfg.minSpd+Math.random()*(cfg.maxSpd-cfg.minSpd);
  const baseAngle=Math.PI/2+(cfg.chaotic?(Math.random()-0.5)*Math.PI*0.9:(Math.random()-0.5)*0.5);
  const vx=Math.cos(baseAngle)*spd, vy=Math.sin(baseAngle)*spd;
  const sides=6+Math.floor(Math.random()*5);
  const pts=[];
  for(let s=0;s<sides;s++){
    const a=(s/sides)*Math.PI*2;
    const rad=r*(0.6+Math.random()*0.4);
    pts.push({x:Math.cos(a)*rad, y:Math.sin(a)*rad});
  }
  const col=`hsl(${25+Math.floor(Math.random()*30)},${30+Math.floor(Math.random()*20)}%,${38+Math.floor(Math.random()*20)}%)`;
  return{x,y,vx,vy,r,pts,rot:Math.random()*Math.PI*2, rotSpd:(Math.random()-0.5)*0.05, col, homing:false};
}

function startLevel(lvl){
  currentLevel=lvl; state='playing';
  R.x=W/2; R.y=H-110; R.vx=0; R.vy=0; R.invincible=100; R.flame=[];
  particles=[]; flashes=[];
  const cfg=getLvlCfg(lvl);
  asteroids=[];
  for(let i=0;i<cfg.count;i++) asteroids.push(makeAsteroid(lvl));
  if(cfg.homing){
    // mark 30% of asteroids as homing
    asteroids.filter((_,i)=>i%3===0).forEach(a=>a.homing=true);
  }
}

// ── PARTICLES ─────────────────────────────────────────
function boom(x,y,col,n=24){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, spd=1+Math.random()*5;
    particles.push({x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:20+Math.random()*25, maxLife:45, col, sz:1.5+Math.random()*3});
  }
}
function spawnFlame(){
  const a=Math.PI/2+(Math.random()-0.5)*0.5;
  R.flame.push({x:R.x+(Math.random()-0.5)*8, y:R.y+R.h/2+4,
    vx:(Math.random()-0.5)*0.8, vy:1.5+Math.random()*2.5,
    life:12, maxLife:12,
    col:Math.random()<0.5?'#ff7700':'#ffdd22'});
}
function showFlash(txt,col){flashes.push({txt,col,life:65,maxLife:65});}

// ── INPUT ─────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if((e.key===' '||e.key==='Enter')&&!lvlPickerOpen){
    if(state==='start'){lives=3;score=0;startLevel(selectedStartLevel);}
    else if(state==='levelup'){startLevel(currentLevel+1);}
    else if(state==='gameover'||state==='win'){lives=3;score=0;startLevel(selectedStartLevel);}
  }
  if(e.key==='Escape') lvlPickerOpen=false;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

canvas.addEventListener('click',e=>{
  const{mx,my}=getXY(e);
  if(lvlPickerOpen){pickerHit(mx,my);return;}
  if(state==='start'||state==='gameover'||state==='win'){
    const bx=W/2-85,by=H/2+88,bw=170,bh=38;
    if(mx>bx&&mx<bx+bw&&my>by&&my<by+bh){lvlPickerOpen=true;return;}
    if(my>H/2+135){lives=3;score=0;startLevel(selectedStartLevel);return;}
  }
});
canvas.addEventListener('touchend',e=>{
  const{mx,my}=getXY(e.changedTouches[0]);
  if(lvlPickerOpen){pickerHit(mx,my);return;}
  if(state==='start'||state==='gameover'||state==='win'){
    const bx=W/2-85,by=H/2+88,bw=170,bh=38;
    if(mx>bx&&mx<bx+bw&&my>by&&my<by+bh){lvlPickerOpen=true;return;}
  }
},{passive:true});

// ── UPDATE ────────────────────────────────────────────
function update(){
  if(state!=='playing') return;

  // Scroll stars
  STARS.forEach(s=>{s.y+=s.spd; if(s.y>H) s.y=-2;});

  // Player movement
  const spd=5.2;
  if(keys['ArrowLeft'])  R.vx=Math.max(R.vx-0.55,-spd);
  if(keys['ArrowRight']) R.vx=Math.min(R.vx+0.55, spd);
  if(keys['ArrowUp'])    R.vy=Math.max(R.vy-0.55,-spd);
  if(keys['ArrowDown'])  R.vy=Math.min(R.vy+0.55, spd*0.7);
  R.vx*=0.87; R.vy*=0.87;
  R.x+=R.vx; R.y+=R.vy;
  R.x=Math.max(R.w,Math.min(W-R.w,R.x));
  R.y=Math.max(R.h,Math.min(H-R.h/2,R.y));
  if(R.invincible>0) R.invincible--;

  // Flame
  if(Math.random()<0.75) spawnFlame();
  R.flame=R.flame.filter(f=>{f.x+=f.vx;f.y+=f.vy;f.life--;return f.life>0;});

  // Particles & flashes
  particles=particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.vx*=0.96; p.life--;return p.life>0;
  });
  flashes=flashes.filter(f=>{f.life--;return f.life>0;});

  // Asteroids
  const cfg=getLvlCfg(currentLevel);
  for(const a of asteroids){
    // Homing: steer toward player
    if(a.homing){
      const dx=R.x-a.x, dy=R.y-a.y;
      const len=Math.hypot(dx,dy)||1;
      a.vx+=(dx/len)*0.018;
      a.vy+=(dy/len)*0.018;
      // Cap speed
      const curSpd=Math.hypot(a.vx,a.vy);
      const cap=cfg.maxSpd*1.2;
      if(curSpd>cap){a.vx=a.vx/curSpd*cap; a.vy=a.vy/curSpd*cap;}
    }

    a.x+=a.vx; a.y+=a.vy; a.rot+=a.rotSpd;
    // Bounce walls
    if(a.x-a.r<0){a.x=a.r; a.vx=Math.abs(a.vx);}
    if(a.x+a.r>W){a.x=W-a.r; a.vx=-Math.abs(a.vx);}
    // Wrap vertically (top/bottom)
    if(a.y-a.r>H){
      a.y=MOON.y+MOON.r+a.r+10;
      a.x=a.r+Math.random()*(W-a.r*2);
    }
    if(a.y+a.r<MOON.y-10){
      a.y=H-a.r;
      a.x=a.r+Math.random()*(W-a.r*2);
    }

    // Hit rocket
    if(R.invincible<=0){
      const dx=R.x-a.x, dy=R.y-a.y;
      if(Math.hypot(dx,dy)<a.r+13){
        lives--;
        boom(R.x,R.y,'#4488ff',30);
        R.invincible=130;
        R.x=W/2; R.y=H-110; R.vx=0; R.vy=0;
        showFlash('💥 HIT!','#ff3333');
        if(lives<=0){state='gameover';return;}
      }
    }
  }

  // Reach moon
  if(Math.hypot(R.x-MOON.x, R.y-MOON.y)<MOON.r+8){
    score+=600*currentLevel;
    boom(MOON.x,MOON.y,'#ffffaa',40);
    state=currentLevel>=10?'win':'levelup';
  }
}

// ── DRAW UTILS ────────────────────────────────────────
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#00000e'); g.addColorStop(1,'#000820');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  STARS.forEach(s=>{
    ctx.save(); ctx.globalAlpha=s.a;
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawMoon(){
  // Outer glow
  const g=ctx.createRadialGradient(MOON.x,MOON.y,MOON.r*0.5,MOON.x,MOON.y,MOON.r*2.4);
  g.addColorStop(0,'rgba(255,255,200,0.15)'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(MOON.x,MOON.y,MOON.r*2.4,0,Math.PI*2); ctx.fill();
  // Body
  ctx.save();
  ctx.shadowColor='#ffffcc'; ctx.shadowBlur=22;
  ctx.fillStyle='#ddd8b8';
  ctx.beginPath(); ctx.arc(MOON.x,MOON.y,MOON.r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  // Craters
  [[-12,-8,9],[14,10,7],[-5,22,5],[20,-15,6],[-20,14,4],[6,-26,5]].forEach(([cx,cy,cr])=>{
    ctx.fillStyle='rgba(0,0,0,0.13)';
    ctx.beginPath(); ctx.arc(MOON.x+cx,MOON.y+cy,cr,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.07)'; ctx.lineWidth=1; ctx.stroke();
  });
  ctx.restore();
  // Label
  ctx.save(); ctx.textAlign='center'; ctx.fillStyle='#ffeeaa';
  ctx.font='bold 12px Arial'; ctx.shadowColor='#ffcc00'; ctx.shadowBlur=10;
  ctx.fillText('🌕 REACH THE MOON',MOON.x,MOON.y+MOON.r+18);
  ctx.restore();
}

function drawRocket(){
  ctx.save();
  ctx.translate(R.x,R.y);
  if(R.invincible>0&&Math.floor(R.invincible/6)%2===0) ctx.globalAlpha=0.28;
  // Body
  ctx.fillStyle='#ccd8ee'; ctx.shadowColor='#88aaff'; ctx.shadowBlur=12;
  ctx.beginPath();
  ctx.moveTo(0,-R.h/2);
  ctx.lineTo(-R.w/2,R.h/4);
  ctx.lineTo(-R.w/2+4,R.h/2);
  ctx.lineTo(R.w/2-4,R.h/2);
  ctx.lineTo(R.w/2,R.h/4);
  ctx.closePath(); ctx.fill(); ctx.shadowBlur=0;
  // Fins
  ctx.fillStyle='#dd3333';
  ctx.beginPath(); ctx.moveTo(-R.w/2,R.h/4); ctx.lineTo(-R.w/2-12,R.h/2+10); ctx.lineTo(-R.w/2+4,R.h/2); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(R.w/2,R.h/4); ctx.lineTo(R.w/2+12,R.h/2+10); ctx.lineTo(R.w/2-4,R.h/2); ctx.closePath(); ctx.fill();
  // Nose stripe
  ctx.fillStyle='#ee4444'; ctx.beginPath(); ctx.moveTo(0,-R.h/2); ctx.lineTo(-5,-R.h/2+14); ctx.lineTo(5,-R.h/2+14); ctx.closePath(); ctx.fill();
  // Window
  ctx.fillStyle='#88ddff'; ctx.shadowColor='#00ccff'; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.arc(0,-2,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(200,240,255,0.5)';
  ctx.beginPath(); ctx.arc(-2,-4,3,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawAsteroids(){
  asteroids.forEach(a=>{
    ctx.save();
    ctx.translate(a.x,a.y); ctx.rotate(a.rot);
    // Homing asteroids glow red
    if(a.homing){ctx.shadowColor='#ff2200'; ctx.shadowBlur=10;}
    ctx.fillStyle=a.col; ctx.strokeStyle='#aa9988'; ctx.lineWidth=1.5;
    ctx.beginPath();
    a.pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  });
}

function drawHUD(){
  ctx.save();
  // Lives
  ctx.textAlign='left'; ctx.fillStyle='#ff6688'; ctx.font='bold 14px Arial';
  ctx.fillText('❤'.repeat(lives),12,28);
  // Score
  ctx.textAlign='center'; ctx.fillStyle='#ffdd00'; ctx.font='bold 14px Arial';
  ctx.fillText('SCORE: '+score,W/2,28);
  // Level
  ctx.textAlign='right'; ctx.fillStyle='#88ddff'; ctx.font='bold 14px Arial';
  ctx.fillText('LVL '+currentLevel+' / 10',W-12,28);
  // Homing warning
  if(getLvlCfg(currentLevel).homing){
    ctx.textAlign='center'; ctx.fillStyle='rgba(255,60,0,0.7)'; ctx.font='bold 11px Arial';
    ctx.fillText('⚠ HOMING ASTEROIDS',W/2,H-12);
  }
  // Flash
  flashes.forEach(f=>{
    ctx.save(); ctx.globalAlpha=f.life/f.maxLife;
    ctx.textAlign='center'; ctx.fillStyle=f.col; ctx.shadowColor=f.col; ctx.shadowBlur=22;
    ctx.font='bold 30px Arial'; ctx.fillText(f.txt,W/2,H/2-60);
    ctx.restore();
  });
  ctx.restore();
}

// ── LEVEL PICKER UI ───────────────────────────────────
function drawSelectLevelBtn(){
  const pulse=0.7+0.3*Math.sin(Date.now()*0.004);
  const bx=W/2-85,by=H/2+88,bw=170,bh=38;
  ctx.save();
  ctx.fillStyle=`rgba(0,100,180,${0.6*pulse})`;
  ctx.strokeStyle=`rgba(0,200,255,${pulse})`;
  ctx.lineWidth=1.5;
  roundRect(bx,by,bw,bh,10); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#aaddff'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
  ctx.fillText(`📋  Start: Level ${selectedStartLevel}`,W/2,by+bh/2+5);
  ctx.restore();
}

function drawLevelPicker(){
  const cols=5,btnW=44,btnH=36,gapX=8,gapY=8;
  const gridW=cols*btnW+(cols-1)*gapX;
  const pw=gridW+40, ph=2*btnH+gapY+80, px=(W-pw)/2, py=(H-ph)/2;
  ctx.save();
  ctx.fillStyle='rgba(2,5,20,0.97)'; ctx.strokeStyle='rgba(0,180,255,0.8)'; ctx.lineWidth=2;
  roundRect(px,py,pw,ph,14); ctx.fill(); ctx.stroke();
  ctx.textAlign='center'; ctx.fillStyle='#88ddff'; ctx.font='bold 16px Arial';
  ctx.fillText('Choose a Level',W/2,py+28);
  // Close X
  ctx.fillStyle='rgba(200,50,50,0.7)';
  roundRect(px+pw-28,py+4,24,24,5); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 14px Arial'; ctx.fillText('✕',px+pw-16,py+20);

  const startX=px+20, startY=py+44;
  for(let i=0;i<10;i++){
    const col=i%cols, row=Math.floor(i/cols);
    const bx=startX+col*(btnW+gapX), by=startY+row*(btnH+gapY);
    const sel=selectedStartLevel===i+1;
    ctx.fillStyle=sel?'rgba(0,200,100,0.85)':'rgba(0,60,120,0.75)';
    ctx.strokeStyle=sel?'#00ff88':'rgba(0,180,255,0.5)';
    ctx.lineWidth=sel?2:1;
    roundRect(bx,by,btnW,btnH,7); ctx.fill(); ctx.stroke();
    ctx.fillStyle=sel?'#fff':'#88ccff'; ctx.font='bold 16px Arial'; ctx.textAlign='center';
    ctx.fillText(i+1,bx+btnW/2,by+btnH/2+6);
  }
  ctx.restore();
}

function pickerHit(mx,my){
  const cols=5,btnW=44,btnH=36,gapX=8,gapY=8;
  const gridW=cols*btnW+(cols-1)*gapX;
  const pw=gridW+40, ph=2*btnH+gapY+80, px=(W-pw)/2, py=(H-ph)/2;
  if(mx>px+pw-32&&mx<px+pw&&my>py&&my<py+32){lvlPickerOpen=false;return;}
  const startX=px+20, startY=py+44;
  for(let i=0;i<10;i++){
    const col=i%cols, row=Math.floor(i/cols);
    const bx=startX+col*(btnW+gapX), by=startY+row*(btnH+gapY);
    if(mx>bx&&mx<bx+btnW&&my>by&&my<by+btnH){selectedStartLevel=i+1;lvlPickerOpen=false;return;}
  }
}

function drawOverlay(title,lines,blink,col){
  ctx.fillStyle='rgba(0,4,18,0.90)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle=col||'#00ccff'; ctx.shadowColor=col||'#0077ff'; ctx.shadowBlur=28;
  ctx.font=`bold ${Math.min(44,W/9)}px "Arial Black",Arial`;
  ctx.fillText(title,W/2,H/2-110); ctx.shadowBlur=0;
  ctx.fillStyle='#bbccdd'; ctx.font=`${Math.min(14,W/36)}px Arial`;
  lines.forEach((l,i)=>ctx.fillText(l,W/2,H/2-44+i*26));
  if((Date.now()/550|0)%2===0){
    ctx.fillStyle='#ffdd00'; ctx.font=`bold ${Math.min(17,W/28)}px Arial`;
    ctx.fillText(blink,W/2,H/2+136);
  }
}

// ── MAIN DRAW ─────────────────────────────────────────
function draw(){
  drawBg();
  drawMoon();

  // Rocket exhaust flame (always visible during play + briefly on death)
  if(state==='playing'){
    R.flame.forEach(f=>{
      ctx.save(); ctx.globalAlpha=(f.life/f.maxLife)*0.88;
      ctx.fillStyle=f.col; ctx.shadowColor=f.col; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(f.x,f.y,2.5+(1-f.life/f.maxLife)*4,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
    drawAsteroids();
    drawRocket();
    drawHUD();
  }

  // Particles (explosions etc.)
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.col; ctx.shadowColor=p.col; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Overlay screens
  if(state==='start'){
    drawOverlay('🚀 MOON RUSH',[
      '↑ ↓ ← →  — Fly your rocket',
      '',
      'Dodge asteroids and reach the Moon!',
      '10 levels — gets very hard.',
      '',
      '3 lives — homing rocks from Level 5!',
    ],'▶  PRESS SPACE TO LAUNCH','#00ccff');
    drawSelectLevelBtn();
    if(lvlPickerOpen) drawLevelPicker();
  } else if(state==='levelup'){
    drawOverlay(`LEVEL ${currentLevel} CLEAR! 🌕`,[
      'You reached the Moon!',
      'Score: '+score,
      '',
      currentLevel<10?`Next: Level ${currentLevel+1} — more asteroids, faster!`:'',
    ],'▶  PRESS SPACE TO CONTINUE','#00ff99');
  } else if(state==='win'){
    drawOverlay('🏆 MISSION COMPLETE!',[
      'All 10 levels conquered!',
      'Final Score: '+score,
      '',
      'You are the greatest space pilot!',
    ],'▶  PRESS SPACE TO PLAY AGAIN','#ffdd00');
    drawSelectLevelBtn();
    if(lvlPickerOpen) drawLevelPicker();
  } else if(state==='gameover'){
    drawOverlay('💥 MISSION FAILED',[
      'Your rocket was destroyed...',
      'Score: '+score,
      'Reached Level '+currentLevel,
    ],'▶  PRESS SPACE TO RETRY','#ff4444');
    drawSelectLevelBtn();
    if(lvlPickerOpen) drawLevelPicker();
  }
}

// ── GAME LOOP ─────────────────────────────────────────
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
<!--PLAYLAYER:START-->
<style id="pl-style">
  html,body{margin:0;}
  canvas{max-width:100vw !important; max-height:100vh !important;}
  #pl-overlay{position:fixed; inset:0; z-index:99999; display:flex; align-items:center; justify-content:center;
    background:rgba(8,10,25,.86); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); padding:20px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  #pl-overlay .pl-card{background:linear-gradient(160deg,#242a52,#1b1f3a); color:#eef1ff; border:1px solid #3a4178;
    border-radius:18px; padding:26px 24px; max-width:440px; width:100%; max-height:88vh; overflow:auto; text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.55);}
  #pl-overlay .pl-title{font-size:26px; font-weight:800; margin:0 0 4px;}
  #pl-overlay .pl-sub{font-size:12px; letter-spacing:2px; text-transform:uppercase; color:#9aa0d0; margin-bottom:12px;}
  #pl-overlay .pl-how{font-size:16px; line-height:1.55; color:#d7daf5; margin-bottom:22px;}
  #pl-overlay .pl-btn{appearance:none; -webkit-appearance:none; border:0; cursor:pointer; background:#7c5cff; color:#fff;
    font-size:19px; font-weight:800; padding:15px 34px; border-radius:14px; width:100%;
    box-shadow:0 8px 22px rgba(124,92,255,.5);}
  #pl-overlay .pl-btn:active{transform:translateY(1px);}
  .pl-hint{position:fixed; left:50%; bottom:18px; transform:translateX(-50%); z-index:99998;
    background:rgba(20,24,52,.92); color:#eef1ff; padding:10px 16px; border-radius:12px; border:1px solid #3a4178;
    max-width:90vw; text-align:center; pointer-events:none; transition:opacity .4s ease;
    font:600 14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
</style>
<script>
/* --- Reyaansh play layer (auto-added) -----------------------------------
   "How to play" screen + responsive scaling + swipe/tap touch controls.
   Per-game config is injected just below (see games.json -> "play"). */
(function(){
  var PLAY = {"type": "game", "how": "Swipe to move in any direction. Tap to start and to jump.", "start": [" ", "Space"], "g": {"l": ["ArrowLeft", "ArrowLeft"], "r": ["ArrowRight", "ArrowRight"], "u": ["ArrowUp", "ArrowUp"], "d": ["ArrowDown", "ArrowDown"], "tap": [" ", "Space"]}};
  if(!PLAY) PLAY = {type:"page", how:"Tap Play to start."};
  var doc=document, win=window;
  var isTouch = ('ontouchstart' in win) || (navigator.maxTouchPoints>0);

  function focusGame(){ try{ win.focus(); if(doc.body){doc.body.tabIndex=-1; doc.body.focus();} }catch(e){} }
  win.addEventListener('load', focusGame);
  doc.addEventListener('mousedown', focusGame);
  doc.addEventListener('touchstart', focusGame, {passive:true});

  if(PLAY.type==='game'){
    win.addEventListener('keydown', function(e){
      var t=e.target;
      if(t && (t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable)) return;
      var k=e.key;
      if(k==='ArrowUp'||k==='ArrowDown'||k==='ArrowLeft'||k==='ArrowRight'||k===' '||k==='Spacebar'){ e.preventDefault(); }
    }, true);
  }

  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

  /* synthetic key dispatch -- sends both key and code so every game matches */
  function fire(type, pair){ if(!pair) return; try{ doc.dispatchEvent(new KeyboardEvent(type,{key:pair[0],code:pair[1],bubbles:true,cancelable:true})); }catch(e){} }
  var held=null;
  function press(pair){ if(held){fire('keyup',held);} held=pair; fire('keydown',pair); }
  function release(){ if(held){fire('keyup',held); held=null;} }
  function tapKey(pair){ if(!pair) return; fire('keydown',pair); setTimeout(function(){fire('keyup',pair);},70); }

  /* how-to-play overlay (shown every time the game opens) */
  function buildOverlay(){
    var ov=doc.createElement('div'); ov.id='pl-overlay';
    ov.innerHTML='<div class="pl-card"><div class="pl-title">'+esc(PLAY.title||doc.title||'Ready?')+'</div>'
      +'<div class="pl-sub">How to play</div><div class="pl-how">'+esc(PLAY.how||'Tap Play to begin.')+'</div>'
      +'<button class="pl-btn" id="pl-play">▶ Play</button></div>';
    doc.body.appendChild(ov);
    doc.getElementById('pl-play').addEventListener('click', startPlay);
  }
  function startPlay(){
    var ov=doc.getElementById('pl-overlay'); if(ov && ov.parentNode) ov.parentNode.removeChild(ov);
    focusGame();
    if(PLAY.type==='keyboard'){ var inp=doc.querySelector('input,textarea'); if(inp){ try{inp.focus(); inp.click();}catch(e){} } }
    else if(PLAY.start){ setTimeout(function(){ tapKey(PLAY.start); }, 140); }
    if(PLAY.type==='game' && isTouch) showHint();
  }
  function showHint(){
    var h=doc.createElement('div'); h.className='pl-hint'; h.textContent=PLAY.how||'Swipe to move · Tap to act';
    doc.body.appendChild(h);
    setTimeout(function(){ h.style.opacity='0'; setTimeout(function(){ if(h.parentNode) h.parentNode.removeChild(h); },500); }, 3600);
  }

  /* swipe / tap gestures (game type, touch devices only) */
  function isInteractive(el){ return el && el.closest && el.closest('button,a,input,textarea,select,[role=button],#pl-overlay,.pl-hint'); }
  function aimAt(e){
    var cv=doc.querySelector('canvas'); if(!cv) return;
    var t=(e.changedTouches&&e.changedTouches[0]); if(!t) return;
    try{ cv.dispatchEvent(new MouseEvent('mousemove',{clientX:t.clientX,clientY:t.clientY,bubbles:true,cancelable:true})); }catch(err){}
  }
  function attachGestures(){
    var g=PLAY.g||{}, TH=24, sx=0,sy=0,st=0,dir=null,moved=false,skip=false,lastTap=0;
    doc.addEventListener('touchstart', function(e){
      if(e.touches.length>1){ skip=true; return; }
      if(isInteractive(e.target)){ skip=true; return; }
      skip=false; var t=e.touches[0]; sx=t.clientX; sy=t.clientY; st=Date.now(); dir=null; moved=false;
    }, {passive:false});
    doc.addEventListener('touchmove', function(e){
      if(skip) return; var t=e.touches[0]; var dx=t.clientX-sx, dy=t.clientY-sy;
      if(Math.abs(dx)<TH && Math.abs(dy)<TH) return;
      if(e.cancelable) e.preventDefault();
      var nd = (Math.abs(dx)>Math.abs(dy)) ? (dx<0?'l':'r') : (dy<0?'u':'d');
      moved=true; if(nd!==dir){ dir=nd; if(g[nd]) press(g[nd]); }
    }, {passive:false});
    doc.addEventListener('touchend', function(e){
      if(skip){ skip=false; return; }
      if(dir){ release(); dir=null; return; }
      if(moved) return;
      if(Date.now()-st>=320) return;
      function doTap(ev){ if(PLAY.aim) aimAt(ev); tapKey(g.tap); }
      var now=Date.now();
      if(g.dtap && now-lastTap<300){ lastTap=0; tapKey(g.dtap); return; }
      lastTap=now;
      if(g.dtap){ var snap=now; setTimeout(function(){ if(lastTap===snap){ doTap(e); lastTap=0; } },270); }
      else { doTap(e); }
    }, {passive:false});
  }

  function init(){
    if(PLAY.type==='game'){
      try{ doc.documentElement.style.overflow='hidden'; doc.body.style.overflow='hidden';
           doc.documentElement.style.touchAction='none'; doc.body.style.touchAction='none'; }catch(e){}
      if(isTouch) attachGestures();
    }
    buildOverlay();
  }
  if(doc.readyState==='loading') doc.addEventListener('DOMContentLoaded', init); else init();
})();
</script>
<!--PLAYLAYER:END-->
</body>
</html>
