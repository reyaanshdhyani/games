<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Typer — Learn Python Typing!</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;font-family:"Trebuchet MS","Comic Sans MS",system-ui,sans-serif;
    background:linear-gradient(160deg,#1b2a4a,#2d1b4a);color:#fff;overflow:hidden;}
  #app{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:16px;}
  .card{width:min(720px,96vw);background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.15);
    border-radius:26px;padding:28px 30px;box-shadow:0 24px 60px rgba(0,0,0,.45);text-align:center;}
  h1{font-size:46px;letter-spacing:1px;margin-bottom:6px;
    background:linear-gradient(90deg,#ffd452,#7dffc4,#5ec6ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .tag{color:#bcd0ff;font-size:17px;margin-bottom:20px;}
  .big-btn{display:inline-block;border:none;cursor:pointer;font-family:inherit;font-weight:bold;
    font-size:24px;padding:16px 40px;border-radius:50px;margin:8px;color:#10223a;
    background:linear-gradient(90deg,#ffd452,#ff9a5e);box-shadow:0 8px 0 #b97b2a;transition:transform .08s, box-shadow .08s;}
  .big-btn:active{transform:translateY(5px);box-shadow:0 3px 0 #b97b2a;}
  .big-btn.green{background:linear-gradient(90deg,#7dffc4,#52c46f);box-shadow:0 8px 0 #2a8a52;color:#0a2a14;}
  .big-btn.blue{background:linear-gradient(90deg,#7dd3ff,#8a9dff);box-shadow:0 8px 0 #4a5ab0;color:#0a1430;}
  .small-btn{border:none;cursor:pointer;font-family:inherit;font-weight:bold;font-size:15px;padding:9px 18px;
    border-radius:30px;margin:4px;background:rgba(255,255,255,.14);color:#fff;}
  .how{text-align:left;background:rgba(0,0,0,.18);border-radius:16px;padding:16px 18px;margin:16px 0;font-size:15.5px;line-height:1.7;color:#dfe8ff;}
  .how b{color:#ffd452;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:17px;font-weight:bold;}
  .chip{background:rgba(0,0,0,.25);border-radius:30px;padding:7px 16px;}
  .chip .v{color:#ffd452;}
  .mascot{font-size:54px;margin:2px 0 6px;height:60px;}
  .timerbar{height:18px;background:rgba(0,0,0,.3);border-radius:12px;overflow:hidden;margin:10px 0 24px;}
  .timerbar>i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#7dffc4,#ffd452,#ff6a6a);transition:width .12s linear;}
  .word{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0 6px;}
  .ltr{font-size:46px;font-weight:bold;width:46px;height:64px;line-height:64px;border-radius:12px;
    background:rgba(255,255,255,.10);color:#cfdaf2;border-bottom:5px solid rgba(255,255,255,.18);transition:.08s;}
  .ltr.ok{background:#2fbf6b;color:#fff;border-bottom-color:#1c8048;}
  .ltr.bad{background:#e8513f;color:#fff;border-bottom-color:#a8331f;animation:shake .2s;}
  .ltr.cur{border-bottom-color:#ffd452;box-shadow:0 0 0 3px #ffd45266 inset;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .hint{color:#9fb3da;font-size:15px;margin-top:6px;height:22px;}
  .feedback{font-size:30px;font-weight:bold;height:40px;margin:6px 0;}
  .result-big{font-size:34px;font-weight:bold;margin:6px 0 4px;}
  .stars{font-size:40px;letter-spacing:6px;margin:8px 0;}
  .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
  .stat{background:rgba(0,0,0,.2);border-radius:14px;padding:12px 18px;min-width:110px;}
  .stat .n{font-size:30px;font-weight:bold;color:#ffd452;}
  .stat .l{font-size:13px;color:#bcd0ff;}
  .challenge-banner{font-size:24px;font-weight:bold;color:#ffd452;margin-bottom:6px;}
  .levelpick{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0;}
  .hidden{display:none;}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
const app=document.getElementById('app');

/* ---------- Python word pools, easy -> hard (get bigger each tier) ---------- */
const TIERS=[
  ["if","or","in","is","def","for","not","and","int","str"],                                  // 2-3
  ["print","while","elif","else","list","true","false","input","range","float","break","class"], // 4-5
  ["return","import","append","number","string","length","divide","modulo","global","format","tuple"], // 6-7
  ["function","variable","integer","boolean","sequence","iterate","operator","comment","library","indexing"], // 8
  ["dictionary","parameter","statement","algorithm","condition","recursion","exception","attribute","expression","comparison"] // 9+
];
/* level -> which tier (words keep getting bigger as he improves) */
function tierForLevel(lv){ return Math.min(Math.floor((lv-1)/3), TIERS.length-1); }
const WORDS_PER_LEVEL=5;
const CHALLENGE_EVERY=3;           // every 3rd level is a challenge
const CHALLENGE_WORDS=4;

/* time allowed to type a word: longer words get more time, higher levels get less */
function wordTime(word,lv){
  const factor=Math.max(0.75, 1.25 - lv*0.03);
  return (2.8 + word.length*0.7) * factor;
}

/* ---------- state ---------- */
let S=null;
function freshState(startLevel){
  return { level:startLevel||1, score:0, streak:0, bestStreak:0,
    wordsDone:0, correct:0, attempts:0,
    queue:[], word:"", typed:"", timeLeft:0, wordMax:0,
    running:false, isChallenge:false, chWordsLeft:0, chFails:0, chTime:0, chTotal:0 };
}

/* pick N words for a level (no immediate repeats) */
function pickWords(lv,n){
  const pool=TIERS[tierForLevel(lv)].slice();
  const out=[]; let last="";
  for(let i=0;i<n;i++){ let w; do{ w=pool[(Math.random()*pool.length)|0]; }while(w===last&&pool.length>1); out.push(w); last=w; }
  return out;
}

/* ---------- screens ---------- */
function show(html){ app.innerHTML='<div class="card">'+html+'</div>'; }

function screenStart(){
  show(`<h1>Code Typer 🐍</h1>
    <div class="tag">Type the Python code words as fast as you can!</div>
    <div class="mascot">🤖</div>
    <div class="how">
      <b>How to play</b><br>
      ⌨️ A code word pops up. Type it before the timer runs out!<br>
      🟩 Letters turn <b>green</b> when right, 🟥 <b>red</b> when wrong.<br>
      🚀 Each level the words get <b>longer and trickier</b>.<br>
      ⚡ Every few levels there's a <b>Challenge</b> — pass it to prove you're a real coder!
    </div>
    <button class="big-btn green" id="startBtn">▶ START</button>
    <div class="levelpick" id="lvlpick"></div>
    <div class="hint">Tip: use Backspace to fix a mistake.</div>`);
  // optional quick start-level buttons
  const lp=document.getElementById('lvlpick');
  lp.innerHTML='<span style="color:#9fb3da;font-size:14px;align-self:center">Start at level:</span>';
  [1,3,5,7,9].forEach(l=>{ const b=document.createElement('button'); b.className='small-btn'; b.textContent=l;
    b.onclick=()=>startGame(l); lp.appendChild(b); });
  document.getElementById('startBtn').onclick=()=>startGame(1);
}

function startGame(lv){
  S=freshState(lv);
  startLevel();
}

function startLevel(){
  // challenge level?
  S.isChallenge = (S.level % CHALLENGE_EVERY === 0);
  if(S.isChallenge){
    S.queue=pickWords(S.level,CHALLENGE_WORDS);
    S.chWordsLeft=CHALLENGE_WORDS; S.chFails=0;
    S.chTotal = S.queue.reduce((a,w)=>a+wordTime(w,S.level),0)*1.15; // one shared countdown (generous)
    S.chTime = S.chTotal;
    screenChallengeIntro();
  } else {
    S.queue=pickWords(S.level,WORDS_PER_LEVEL);
    nextWord(true);
  }
}

function screenChallengeIntro(){
  stopTimer();
  show(`<div class="topbar"><span class="chip">Level <span class="v">${S.level}</span></span>
      <span class="chip">⭐ <span class="v">${S.score}</span></span></div>
    <div class="mascot">⚡</div>
    <div class="challenge-banner">CHALLENGE TIME!</div>
    <div class="how" style="text-align:center">Type <b>${CHALLENGE_WORDS} words</b> before the timer runs out.<br>
      Finish them all and you <b>level up</b>! 🎉<br>Miss the time and you'll <b>practice again</b>. 💪</div>
    <button class="big-btn green" id="go">⚡ I'M READY!</button>
    <div><button class="small-btn" id="quitBtn">✕ Quit</button></div>`);
  document.getElementById('go').onclick=()=>{ S.running=true; nextWord(true); };
  document.getElementById('quitBtn').onclick=quitGame;
}

function nextWord(first){
  if(S.queue.length===0){ levelDone(); return; }
  S.word=S.queue.shift(); S.typed="";
  if(S.isChallenge){
    if(first){ /* shared timer already set */ }
  } else {
    S.wordMax=wordTime(S.word,S.level); S.timeLeft=S.wordMax;
  }
  S.running=true;
  renderPlay();
  startTimer();
}

function renderPlay(feedback,fbColor){
  const pct = S.isChallenge ? (S.chTime/S.chTotal*100) : (S.timeLeft/S.wordMax*100);
  const tiles=[...S.word].map((ch,i)=>{
    let cls='ltr';
    if(i<S.typed.length){ cls+= (S.typed[i].toLowerCase()===ch.toLowerCase())?' ok':' bad'; }
    else if(i===S.typed.length){ cls+=' cur'; }
    return `<div class="${cls}">${ch}</div>`;
  }).join('');
  const header = S.isChallenge
    ? `<span class="chip">⚡ Challenge</span><span class="chip">Words left <span class="v">${S.queue.length+1}</span></span><span class="chip">⭐ <span class="v">${S.score}</span></span>`
    : `<span class="chip">Level <span class="v">${S.level}</span></span><span class="chip">🔥 <span class="v">${S.streak}</span></span><span class="chip">⭐ <span class="v">${S.score}</span></span>`;
  show(`<div class="topbar">${header}</div>
    <div class="mascot">${S.isChallenge?'⚡':'🤖'}</div>
    <div class="timerbar"><i id="tbar" style="width:${pct}%"></i></div>
    <div class="word">${tiles}</div>
    <div class="feedback" style="color:${fbColor||'#9fb3da'}">${feedback||''}</div>
    <div class="hint">Type the word!  ·  Backspace to fix</div>
    <div style="margin-top:12px"><button class="small-btn" id="quitBtn">✕ Quit</button></div>`);
  const q=document.getElementById('quitBtn'); if(q) q.onclick=quitGame;
}
function quitGame(){ stopTimer(); if(S) S.running=false; S=null; screenStart(); }

/* ---------- timer ---------- */
let timerId=null,lastT=0;
function startTimer(){ stopTimer(); lastT=performance.now(); timerId=requestAnimationFrame(tick); }
function stopTimer(){ if(timerId){ cancelAnimationFrame(timerId); timerId=null; } }
function tick(now){
  const dt=(now-lastT)/1000; lastT=now;
  if(!S.running){ timerId=requestAnimationFrame(tick); return; }
  if(S.isChallenge){
    S.chTime-=dt;
    const bar=document.getElementById('tbar'); if(bar) bar.style.width=Math.max(0,S.chTime/S.chTotal*100)+'%';
    if(S.chTime<=0){ challengeFail(); return; }
  } else {
    S.timeLeft-=dt;
    const bar=document.getElementById('tbar'); if(bar) bar.style.width=Math.max(0,S.timeLeft/S.wordMax*100)+'%';
    if(S.timeLeft<=0){ wordTimeout(); return; }
  }
  timerId=requestAnimationFrame(tick);
}

/* ---------- typing ---------- */
document.addEventListener('keydown',e=>{
  if(!S||!S.running) return;
  if(e.key==='Backspace'){ e.preventDefault(); S.typed=S.typed.slice(0,-1); updateTiles(); return; }
  if(e.key.length===1 && /[a-zA-Z0-9_]/.test(e.key)){
    e.preventDefault();
    if(S.typed.length<S.word.length){ S.typed+=e.key; updateTiles(); checkWord(); }
  }
});
function updateTiles(){
  const tiles=app.querySelectorAll('.ltr');
  [...S.word].forEach((ch,i)=>{
    const el=tiles[i]; if(!el) return; el.className='ltr';
    if(i<S.typed.length) el.className+= (S.typed[i].toLowerCase()===ch.toLowerCase())?' ok':' bad';
    else if(i===S.typed.length) el.className+=' cur';
  });
}
function checkWord(){
  if(S.typed.length<S.word.length) return;
  S.attempts++;
  const right = S.typed.toLowerCase()===S.word.toLowerCase();
  if(right){
    S.correct++; S.wordsDone++;
    if(S.isChallenge){
      S.score+=60; S.running=false;
      flash('✓ Nice!','#7dffc4');
      setTimeout(()=>{ if(S.queue.length===0){ challengePass(); } else { nextWord(false); } }, 350);
    } else {
      S.streak++; S.bestStreak=Math.max(S.bestStreak,S.streak);
      const pts=50+Math.round(S.timeLeft*12)+S.streak*5; S.score+=pts;
      flash('✓ +'+pts,'#7dffc4');
      S.running=false;
      setTimeout(()=>nextWord(false),350);
    }
  } else {
    // wrong full word: clear and let them retry (not in challenge penalty beyond time)
    if(!S.isChallenge) S.streak=0;
    flash('✗ Try again','#ff8a8a');
    setTimeout(()=>{ S.typed=''; updateTiles(); const fb=app.querySelector('.feedback'); if(fb)fb.textContent=''; },450);
  }
}
function flash(msg,color){ const fb=app.querySelector('.feedback'); if(fb){ fb.textContent=msg; fb.style.color=color; } }

function wordTimeout(){
  S.running=false; S.streak=0; stopTimer();
  flash('⏰ Time! It was "'+S.word+'"','#ffd452');
  setTimeout(()=>{ S.running=true; nextWord(false); },1100);
}

/* ---------- level / challenge end ---------- */
function levelDone(){
  stopTimer(); S.running=false;
  // normal level finished -> next level
  S.level++;
  screenLevelUp();
}
function screenLevelUp(){
  const acc = S.attempts? Math.round(S.correct/S.attempts*100):100;
  show(`<div class="mascot">🚀</div>
    <div class="result-big" style="color:#7dffc4">Level Complete!</div>
    <div class="tag">Get ready for Level ${S.level} — bigger words!</div>
    <div class="row">
      <div class="stat"><div class="n">${S.score}</div><div class="l">Score</div></div>
      <div class="stat"><div class="n">${S.bestStreak}</div><div class="l">Best Streak</div></div>
      <div class="stat"><div class="n">${acc}%</div><div class="l">Accuracy</div></div>
    </div>
    <button class="big-btn green" id="cont">▶ NEXT LEVEL</button>
    <div><button class="small-btn" id="home">🏠 Home</button></div>`);
  document.getElementById('cont').onclick=()=>startLevel();
  document.getElementById('home').onclick=screenStart;
}
function challengePass(){
  stopTimer(); S.running=false; S.score+=200;
  S.level++; // advance past the challenge
  show(`<div class="mascot">🎉</div>
    <div class="result-big" style="color:#7dffc4">CHALLENGE PASSED!</div>
    <div class="stars">⭐⭐⭐</div>
    <div class="tag">Awesome — you're becoming a real coder! On to Level ${S.level}.</div>
    <div class="row"><div class="stat"><div class="n">${S.score}</div><div class="l">Score</div></div></div>
    <button class="big-btn green" id="cont">▶ KEEP GOING</button>
    <div><button class="small-btn" id="home">🏠 Home</button></div>`);
  document.getElementById('cont').onclick=()=>startLevel();
  document.getElementById('home').onclick=screenStart;
}
function challengeFail(){
  stopTimer(); S.running=false;
  show(`<div class="mascot">💪</div>
    <div class="result-big" style="color:#ffd452">So close!</div>
    <div class="tag">You need a little more practice — you can do it!<br>Let's try the practice level again.</div>
    <button class="big-btn blue" id="retry">🔁 PRACTICE AGAIN</button>
    <div><button class="small-btn" id="home">🏠 Home</button></div>`);
  document.getElementById('retry').onclick=()=>{ S.level=Math.max(1,S.level-1); S.isChallenge=false; startLevel(); };
  document.getElementById('home').onclick=screenStart;
}

/* go! */
screenStart();
</script>
<!--PLAYLAYER:START-->
<style id="pl-style">
  html,body{margin:0;}
  canvas{max-width:100vw !important; max-height:100vh !important;}
  #pl-overlay{position:fixed; inset:0; z-index:99999; display:flex; align-items:center; justify-content:center;
    background:rgba(8,10,25,.86); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); padding:20px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  #pl-overlay .pl-card{background:linear-gradient(160deg,#242a52,#1b1f3a); color:#eef1ff; border:1px solid #3a4178;
    border-radius:18px; padding:26px 24px; max-width:440px; width:100%; max-height:88vh; overflow:auto; text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.55);}
  #pl-overlay .pl-title{font-size:26px; font-weight:800; margin:0 0 4px;}
  #pl-overlay .pl-sub{font-size:12px; letter-spacing:2px; text-transform:uppercase; color:#9aa0d0; margin-bottom:12px;}
  #pl-overlay .pl-how{font-size:16px; line-height:1.55; color:#d7daf5; margin-bottom:22px;}
  #pl-overlay .pl-btn{appearance:none; -webkit-appearance:none; border:0; cursor:pointer; background:#7c5cff; color:#fff;
    font-size:19px; font-weight:800; padding:15px 34px; border-radius:14px; width:100%;
    box-shadow:0 8px 22px rgba(124,92,255,.5);}
  #pl-overlay .pl-btn:active{transform:translateY(1px);}
  .pl-hint{position:fixed; left:50%; bottom:18px; transform:translateX(-50%); z-index:99998;
    background:rgba(20,24,52,.92); color:#eef1ff; padding:10px 16px; border-radius:12px; border:1px solid #3a4178;
    max-width:90vw; text-align:center; pointer-events:none; transition:opacity .4s ease;
    font:600 14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
</style>
<script>
/* --- Reyaansh play layer (auto-added) -----------------------------------
   "How to play" screen + responsive scaling + swipe/tap touch controls.
   Per-game config is injected just below (see games.json -> "play"). */
(function(){
  var PLAY = {"type": "keyboard", "how": "Tap the typing area to bring up your keyboard, then type the words shown to learn Python typing."};
  if(!PLAY) PLAY = {type:"page", how:"Tap Play to start."};
  var doc=document, win=window;
  var isTouch = ('ontouchstart' in win) || (navigator.maxTouchPoints>0);

  function focusGame(){ try{ win.focus(); if(doc.body){doc.body.tabIndex=-1; doc.body.focus();} }catch(e){} }
  win.addEventListener('load', focusGame);
  doc.addEventListener('mousedown', focusGame);
  doc.addEventListener('touchstart', focusGame, {passive:true});

  if(PLAY.type==='game'){
    win.addEventListener('keydown', function(e){
      var t=e.target;
      if(t && (t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable)) return;
      var k=e.key;
      if(k==='ArrowUp'||k==='ArrowDown'||k==='ArrowLeft'||k==='ArrowRight'||k===' '||k==='Spacebar'){ e.preventDefault(); }
    }, true);
  }

  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

  /* synthetic key dispatch -- sends both key and code so every game matches */
  function fire(type, pair){ if(!pair) return; try{ doc.dispatchEvent(new KeyboardEvent(type,{key:pair[0],code:pair[1],bubbles:true,cancelable:true})); }catch(e){} }
  var held=null;
  function press(pair){ if(held){fire('keyup',held);} held=pair; fire('keydown',pair); }
  function release(){ if(held){fire('keyup',held); held=null;} }
  function tapKey(pair){ if(!pair) return; fire('keydown',pair); setTimeout(function(){fire('keyup',pair);},70); }

  /* how-to-play overlay (shown every time the game opens) */
  function buildOverlay(){
    var ov=doc.createElement('div'); ov.id='pl-overlay';
    ov.innerHTML='<div class="pl-card"><div class="pl-title">'+esc(PLAY.title||doc.title||'Ready?')+'</div>'
      +'<div class="pl-sub">How to play</div><div class="pl-how">'+esc(PLAY.how||'Tap Play to begin.')+'</div>'
      +'<button class="pl-btn" id="pl-play">▶ Play</button></div>';
    doc.body.appendChild(ov);
    doc.getElementById('pl-play').addEventListener('click', startPlay);
  }
  function startPlay(){
    var ov=doc.getElementById('pl-overlay'); if(ov && ov.parentNode) ov.parentNode.removeChild(ov);
    focusGame();
    if(PLAY.type==='keyboard'){ var inp=doc.querySelector('input,textarea'); if(inp){ try{inp.focus(); inp.click();}catch(e){} } }
    else if(PLAY.start){ setTimeout(function(){ tapKey(PLAY.start); }, 140); }
    if(PLAY.type==='game' && isTouch) showHint();
  }
  function showHint(){
    var h=doc.createElement('div'); h.className='pl-hint'; h.textContent=PLAY.how||'Swipe to move · Tap to act';
    doc.body.appendChild(h);
    setTimeout(function(){ h.style.opacity='0'; setTimeout(function(){ if(h.parentNode) h.parentNode.removeChild(h); },500); }, 3600);
  }

  /* swipe / tap gestures (game type, touch devices only) */
  function isInteractive(el){ return el && el.closest && el.closest('button,a,input,textarea,select,[role=button],#pl-overlay,.pl-hint'); }
  function aimAt(e){
    var cv=doc.querySelector('canvas'); if(!cv) return;
    var t=(e.changedTouches&&e.changedTouches[0]); if(!t) return;
    try{ cv.dispatchEvent(new MouseEvent('mousemove',{clientX:t.clientX,clientY:t.clientY,bubbles:true,cancelable:true})); }catch(err){}
  }
  function attachGestures(){
    var g=PLAY.g||{}, TH=24, sx=0,sy=0,st=0,dir=null,moved=false,skip=false,lastTap=0;
    doc.addEventListener('touchstart', function(e){
      if(e.touches.length>1){ skip=true; return; }
      if(isInteractive(e.target)){ skip=true; return; }
      skip=false; var t=e.touches[0]; sx=t.clientX; sy=t.clientY; st=Date.now(); dir=null; moved=false;
    }, {passive:false});
    doc.addEventListener('touchmove', function(e){
      if(skip) return; var t=e.touches[0]; var dx=t.clientX-sx, dy=t.clientY-sy;
      if(Math.abs(dx)<TH && Math.abs(dy)<TH) return;
      if(e.cancelable) e.preventDefault();
      var nd = (Math.abs(dx)>Math.abs(dy)) ? (dx<0?'l':'r') : (dy<0?'u':'d');
      moved=true; if(nd!==dir){ dir=nd; if(g[nd]) press(g[nd]); }
    }, {passive:false});
    doc.addEventListener('touchend', function(e){
      if(skip){ skip=false; return; }
      if(dir){ release(); dir=null; return; }
      if(moved) return;
      if(Date.now()-st>=320) return;
      function doTap(ev){ if(PLAY.aim) aimAt(ev); tapKey(g.tap); }
      var now=Date.now();
      if(g.dtap && now-lastTap<300){ lastTap=0; tapKey(g.dtap); return; }
      lastTap=now;
      if(g.dtap){ var snap=now; setTimeout(function(){ if(lastTap===snap){ doTap(e); lastTap=0; } },270); }
      else { doTap(e); }
    }, {passive:false});
  }

  function init(){
    if(PLAY.type==='game'){
      try{ doc.documentElement.style.overflow='hidden'; doc.body.style.overflow='hidden';
           doc.documentElement.style.touchAction='none'; doc.body.style.touchAction='none'; }catch(e){}
      if(isTouch) attachGestures();
    }
    buildOverlay();
  }
  if(doc.readyState==='loading') doc.addEventListener('DOMContentLoaded', init); else init();
})();
</script>
<!--PLAYLAYER:END-->
